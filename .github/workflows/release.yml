name: Release

on:
  workflow_run:
    workflows: [Validate]
    types: [completed]
    branches: [master]

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Python Semantic Release
        id: semantic_release
        uses: python-semantic-release/python-semantic-release@39dd2052f2ce8282a5d932c31d58a2ca06d2550e # v10
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}

      - name: Create/Update latest GitHub Release
        if: ${{ steps.semantic_release.outputs.released == 'true' && steps.semantic_release.outputs.is_prerelease == 'false' }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: latest
          name: latest
          target_commitish: ${{ github.sha }}
          generate_release_notes: false
          prerelease: false
          overwrite_files: true
          body: |
            Alias release for tooling that resolves by `latest`.
            Current stable tag: ${{ steps.semantic_release.outputs.tag }}
